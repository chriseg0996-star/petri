name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build Petri.slnx -c Release
      - name: Tests
        run: dotnet test Petri.slnx -c Release --no-build
      - name: Determinism gate — double-run 6k ticks, identical hashes
        run: dotnet run --project src/Petri.Runner -c Release -- determinism --seed 42 --ticks 6000
